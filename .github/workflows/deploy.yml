name: Deploy Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 13.233.136.88
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /var/www/blog
            git pull origin main
            composer install --no-dev
            php artisan migrate --force